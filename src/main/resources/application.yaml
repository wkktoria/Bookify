spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: Bookify
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:54320}/${DB_NAME:bookify}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:admin}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db.migration/general,classpath:db.migration/inserts
    schemas: public
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${OAUTH2_CLIENT_ID}
            client-secret: ${OAUTH2_CLIENT_SECRET}
            redirect-uri: https://localhost:8443/login/oauth2/code/google
      resourceserver:
        jwt:
          issuer-uri: https://accounts.google.com
  mail:
    host: smtp.gmail.com
    port: 587
    username: wkktoria2002@gmail.com
    password: ${MAIL_SENDER_PWD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true
            required: true
logging:
  level:
    org:
      springframework:
        security: debug
    root: ${LOG_LEVEL:debug}
server:
  ssl:
    key-store-type: PKCS12
    key-store: classpath:certificate.p12
    key-store-password: ${PKCS12_CERT_PASSWORD:cert}
    enabled: true
  port: 8443
management:
  endpoints:
    web:
      exposure:
        include: "*"