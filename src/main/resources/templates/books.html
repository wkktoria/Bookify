<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Bookify - Book List</title>
</head>
<body>
<h1>Book List</h1>
<ul>
    <li th:each="book : ${bookMap}">
        <span th:text="${book.key} + ': ' + ${book.value}"></span>
    </li>
</ul>
</body>
</html>
